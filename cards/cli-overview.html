<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayOrbs CLI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');

:root {
  --bg: #0a0a0a;
  --green: #00ff88;
  --white: #ffffff;
  --muted: #505050;
  --font: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--font);
}

.card {
  width: 1200px;
  height: 300px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  gap: 16px;
}

.card::before {
  content: '';
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.ascii-art {
  font-size: 14px;
  line-height: 1.15;
  color: var(--green);
  white-space: pre;
  text-align: center;
}

.tagline {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 2px;
}

.tagline span {
  color: var(--green);
}
</style>
</head>
<body>

<div class="card">
  <div class="ascii-art">    ____  __               ____       __         
   / __ \/ /___ ___  __   / __ \_____/ /_  _____ 
  / /_/ / / __ `/ / / /  / / / / ___/ __ \/ ___/ 
 / ____/ / /_/ / /_/ /  / /_/ / /  / /_/ (__  )  
/_/   /_/\__,_/\__, /   \____/_/  /_.___/____/   
              /____/                             </div>
  <div class="tagline">CLI for <span>AI Agents</span> • Non-interactive • Machine-readable</div>
</div>

</body>
</html>
